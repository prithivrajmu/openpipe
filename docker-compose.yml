services:
  kafka:
    image: quay.io/strimzi/kafka:latest-kafka-3.7.0
    hostname: kafka
    container_name: kafka
    command: [ "sh", "-c", "bin/kafka-storage.sh format -t MkU3OEVBNTcwNTJENDM2Qk -c config/kraft/server.properties && bin/kafka-server-start.sh config/kraft/server.properties --override listeners=INTERNAL://0.0.0.0:9094,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093 --override advertised.listeners=INTERNAL://kafka:9094,EXTERNAL://localhost:9092 --override listener.security.protocol.map=CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT --override inter.broker.listener.name=INTERNAL --override controller.quorum.voters=1@kafka:9093" ]
    ports:
      - "9092:9092"
    environment:
      LOG_DIR: "/tmp/logs"
    healthcheck:
      test: [ "CMD-SHELL", "bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092" ]
      interval: 10s
      timeout: 10s
      retries: 5
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: openpipe-timescaledb
    environment:
      POSTGRES_USER: openpipe
      POSTGRES_PASSWORD: openpipe
      POSTGRES_DB: openpipe_data
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U openpipe -d openpipe_data" ]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8082:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9094

  jobmanager:
    image: flink:1.18-java11
    container_name: openpipe-jobmanager
    ports:
      - "8083:8081"
    command: jobmanager
    environment:
      - JOB_MANAGER_RPC_ADDRESS=jobmanager
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 4
        parallelism.default: 1
        classloader.resolve-order: parent-first
        rest.flamegraph.enabled: true
    volumes:
      - flink_jars:/opt/flink/lib/extra
      - ./flink_processor:/opt/flink/jobs/flink_processor:ro
      - ./config:/opt/flink/jobs/config:ro
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8081/jobs/overview" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  taskmanager:
    image: flink:1.18-java11
    container_name: openpipe-taskmanager
    depends_on:
      - jobmanager
    command: taskmanager
    environment:
      - JOB_MANAGER_RPC_ADDRESS=jobmanager
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 4
        classloader.resolve-order: parent-first
    volumes:
      - flink_jars:/opt/flink/lib/extra
      - ./flink_processor:/opt/flink/jobs/flink_processor:ro
      - ./config:/opt/flink/jobs/config:ro

  # Init container to download Flink connector JARs
  flink-jar-downloader:
    image: curlimages/curl:latest
    container_name: flink-jar-downloader
    volumes:
      - flink_jars:/jars
    entrypoint: [ "sh", "-c" ]
    command:
      - |
        echo "Downloading Flink Kafka connector JARs..."
        cd /jars
        if [ ! -f flink-connector-kafka-3.1.0-1.18.jar ]; then
          curl -fSL -o flink-connector-kafka-3.1.0-1.18.jar \
            "https://repo1.maven.org/maven2/org/apache/flink/flink-connector-kafka/3.1.0-1.18/flink-connector-kafka-3.1.0-1.18.jar"
        fi
        if [ ! -f kafka-clients-3.7.0.jar ]; then
          curl -fSL -o kafka-clients-3.7.0.jar \
            "https://repo1.maven.org/maven2/org/apache/kafka/kafka-clients/3.7.0/kafka-clients-3.7.0.jar"
        fi
        if [ ! -f flink-connector-jdbc-3.1.2-1.18.jar ]; then
          curl -fSL -o flink-connector-jdbc-3.1.2-1.18.jar \
            "https://repo1.maven.org/maven2/org/apache/flink/flink-connector-jdbc/3.1.2-1.18/flink-connector-jdbc-3.1.2-1.18.jar"
        fi
        if [ ! -f postgresql-42.7.1.jar ]; then
          curl -fSL -o postgresql-42.7.1.jar \
            "https://repo1.maven.org/maven2/org/postgresql/postgresql/42.7.1/postgresql-42.7.1.jar"
        fi
        echo "All JARs downloaded:"
        ls -la /jars/
    restart: "no"

volumes:
  timescale_data:
  flink_jars:
